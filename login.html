<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlockd – Inloggen</title>
    <link rel="stylesheet" href="interface.css">
    <script>
        // Als er al een geldige sessie is, stuur direct door naar de juiste pagina
        (function () {
            try {
                const session = localStorage.getItem('unlockd_user');
                if (session) {
                    const u = JSON.parse(session);
                    if (u && u.role === 'student') window.location.replace('achievements.html');
                    else if (u && u.role === 'teacher') window.location.replace('teacher.html');
                }
            } catch (e) { localStorage.removeItem('unlockd_user'); }
        })();
    </script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #A78BFA 0%, #7F6AF7 50%, #6D5CE7 100%);
            padding: 20px;
        }
        .login-card {
            background: var(--surface);
            border-radius: var(--r-lg);
            padding: 44px 40px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(46, 46, 63, 0.35);
            text-align: center;
            animation: slideUp 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .login-logo {
            height: 80px;
            width: auto;
            margin-bottom: 16px;
            filter: drop-shadow(0 8px 20px rgba(167,139,250,0.4));
        }
        .login-card h1 {
            font-size: 2.4rem;
            font-weight: 900;
            color: var(--slate);
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }
        .login-tagline {
            color: var(--brand);
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 32px;
        }
        .form-group { text-align: left; margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 800;
            color: var(--slate);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .input-wrap { position: relative; }
        .input-wrap .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            opacity: 0.5;
            pointer-events: none;
        }
        .form-group input {
            width: 100%;
            padding: 13px 16px 13px 42px;
            border: 2px solid var(--border-card);
            border-radius: var(--r-sm);
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            color: var(--slate);
            background: var(--bg);
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 4px rgba(167,139,250,0.15);
            background: var(--surface);
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            opacity: 0.6;
            padding: 4px 8px;
            border-radius: 6px;
            transition: opacity 0.2s, background 0.2s;
        }
        .toggle-password:hover { opacity: 1; background: rgba(167,139,250,0.1); }
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #A78BFA 0%, #8B5CF6 100%);
            color: white;
            border: none;
            border-radius: var(--r-sm);
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.25s;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 8px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(167,139,250,0.45); }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #DC2626;
            border-radius: var(--r-sm);
            padding: 12px 16px;
            margin-top: 14px;
            font-size: 0.875rem;
            font-weight: 700;
            display: none;
            text-align: left;
            animation: shake 0.4s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .demo-hint {
            margin-top: 22px;
            background: rgba(167,139,250,0.08);
            border: 1px dashed rgba(167,139,250,0.4);
            border-radius: var(--r-sm);
            padding: 12px 14px;
            text-align: left;
            font-size: 0.78rem;
            color: var(--slate-light);
            font-weight: 600;
            line-height: 1.6;
        }
        .demo-hint strong {
            color: var(--brand-dark);
            font-weight: 900;
            display: block;
            margin-bottom: 4px;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .demo-hint code {
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
            background: var(--surface);
            padding: 1px 6px;
            border-radius: 4px;
            color: var(--slate);
        }
        .footer-note {
            margin-top: 20px;
            font-size: 0.75rem;
            color: var(--slate-lighter);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="Unlockd_logo_no_background1.png" alt="Unlockd Logo" class="login-logo" onerror="this.style.display='none'">
        <h1>Unlockd</h1>
        <p class="login-tagline">Real Achievements. Real You.</p>

        <form id="login-form" onsubmit="doLogin(event)" autocomplete="on">
            <div class="form-group">
                <label for="username">Gebruikersnaam</label>
                <div class="input-wrap">
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" placeholder="Voer je gebruikersnaam in" autocomplete="username" required autofocus>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Wachtwoord</label>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" placeholder="Voer je wachtwoord in" autocomplete="current-password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword()" aria-label="Wachtwoord tonen/verbergen">👁️</button>
                </div>
            </div>

            <button type="submit" class="btn-login" id="login-btn">Inloggen</button>
            <div class="error-msg" id="error-msg">❌ Ongeldige gebruikersnaam of wachtwoord.</div>
        </form>

        <div class="demo-hint">
            <strong>🧪 Demo-accounts</strong>
            Student: <code>student</code> / <code>student123</code><br>
            Leerkracht: <code>leerkracht</code> / <code>teacher123</code>
        </div>

        <p class="footer-note">ITF04 · Team 4 · Schooljaar 2025–26</p>
    </div>

    <script src="login.js"></script>
</body>
</html>
